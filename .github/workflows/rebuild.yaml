on:
  workflow_dispatch:
  # schedule:
  #   - cron: "0 3 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Build image
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKEHUB_USERNAME }}
          password: ${{ secrets.DOCKEHUB_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: rentgonz/toolbox-containers:fedora43